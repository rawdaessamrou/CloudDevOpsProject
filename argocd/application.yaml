apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clouddevopsproject
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rawdaessamrou/CloudDevOpsProject.git
    targetRevision: main
    path: Kubernates
  destination:
    server: https://kubernetes.default.svc
    namespace: ivolve
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true